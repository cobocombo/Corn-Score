<!-- ////////////////////////////////////////////////// -->

<ons-modal id="report-a-bug-modal" animation="lift">
  <ons-page id="report-a-bug">

    <!-- Toolbar -->
    <ons-toolbar>
      <div class="left">
        <ons-toolbar-button icon="fa-times" style="color: black;" onclick="hideModal('report-a-bug-modal')"></ons-toolbar-button>
      </div>
      <div class="center">Report A Bug</div>
      <div class="right">
          <ons-toolbar-button icon="fa-paper-plane" style="color: black;" onclick="submitBugReport()"></ons-toolbar-button>
      </div>
    </ons-toolbar>

    <!-- Report A Bug Form List -->
    <ons-list>
      <ons-list-header>Title</ons-list-header>
      <ons-list-item>
        <div class="center">
          <ons-input id="report-a-bug-title" float maxlength="40" style="width: 100%;" placeholder="A title that summarizes the issue..."></ons-input>
        </div>
      </ons-list-item>
      <ons-list-header>Description</ons-list-header>
      <ons-list-item>
        <div class="center">
          <textarea class="textarea textarea--transparent" id="report-a-bug-description", style="width: 100%;" placeholder="A detailed description of what's going wrong..." rows="5"></textarea>
        </div>
      </ons-list-item>
      <ons-list-header>Email</ons-list-header>
      <ons-list-item>
        <div class="center">
          <ons-input id="report-a-bug-email" float maxlength="40" style="width: 100%;" placeholder="A good email to discuss the issue..." type="email"></ons-input>
        </div>
      </ons-list-item>
    </ons-list>

  </ons-page>
</ons-modal>

<!-- ////////////////////////////////////////////////// -->
