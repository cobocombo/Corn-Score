<!-- //////////////////////////////////////////////////////
// Whats News Page
// - Displays a changelog of recent app updates, organized by version.
// - Each version section highlights new features and enhancements added to the app.
////////////////////////////////////////////////////// -->

<ons-page>
  
  <!-- Toolbar -->  
  <ons-toolbar>
    <div class="left">
      <ons-toolbar-button icon="fa-angle-left" style="color: black;" onclick="popPage()"></ons-toolbar-button>
    </div>
    <div class="center">What's New?</div>
  </ons-toolbar>
  
  <div class="whats-new-content">
    <h3 id="whats-new-app-version-header">Version 1.5</h3>
    <div class="content-row">
      <div class="item-row">
        <i class="fas fa-check-circle fa-icon"></i>
        <div class="text-content">
          <p class="title-text">Rules Feature</p>
          <p class="description-text">Added a rules section to settings</p>
        </div>
      </div>
      <div class="item-row">
        <i class="fas fa-palette fa-icon"></i>
        <div class="text-content">
          <p class="title-text">Rounds Feature</p>
          <p class="description-text">Added feature to keep track of rounds played</p>
        </div>
      </div>
      <div class="item-row">
        <i class="fas fa-bug fa-icon"></i>
        <div class="text-content">
          <p class="title-text">Bug Fixes</p>
          <p class="description-text">Fixed some existing bugs and added stability updates</p>
        </div>
      </div>
    </div>
  </div>

</ons-page>
  
<!-- //////////////////////////////////////////////// -->
