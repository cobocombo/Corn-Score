<!DOCTYPE html>
<html>
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'">
    <link rel="stylesheet" href="../Libraries/Onsen/css/onsenui.css">
    <link rel="stylesheet" href="../Libraries/Onsen/css/onsen-css-components.min.css">
    <link rel="stylesheet" href="../Styles/board.css"/>
    <link rel="stylesheet" href="../Styles/privacy-policy.css"/>
    <link rel="stylesheet" href="../Styles/whats-new.css"/>
  </head>
  <body>
    <ons-navigator swipeable id="navigator" page="board.html"></ons-navigator>

    <!-- ///////////////////////////// THIRD PARTY LIBARIES ///////////////////////////// -->
    <script src="../Libraries/Onsen/js/onsenui.min.js"></script>
    <script src="../Libraries/Confetti/confetti.js"></script>

    <!-- ///////////////////////////// SCRIPTS ///////////////////////////// -->
    <script src="../Scripts/secret.js"></script>
    <script src="../Scripts/input-validator.js"></script>
    <script src="../Scripts/issue-manager.js"></script>
    <script src="../Scripts/navigation.js"></script>
    <script src="../Scripts/settings-manager.js"></script>
    <script src="../Scripts/board-manager.js"></script>
  </body>
</html>
