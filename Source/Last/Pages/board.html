<!-- /////////////////////////////////////////////////////////// -->
 
<ons-page id="board">

  <!-- Toolbar -->
  <ons-toolbar>
    <div class="left">
      <ons-toolbar-button icon="fa-redo" id="restart-button" style="color: black;" onclick="restartButtonTapped()"></ons-toolbar-button>
    </div>
    <div class="center">Corn Score</div>
    <div class="right">
      <ons-toolbar-button icon="fa-cog" id="settings-button" style="color: black;"></ons-toolbar-button>
    </div>
  </ons-toolbar>

  <!-- Timer Speed Dial-->
  <ons-speed-dial position="bottom right" direction="left" id="timer-speed-dial">
    <ons-fab id="main-timer-fab-button">00:30</ons-fab>
    <ons-speed-dial-item id="start-timer-speed-dial-button" onclick="timerPlayButtonTapped()">
      <ons-icon icon="fa-play"></ons-icon>
    </ons-speed-dial-item>
    <ons-speed-dial-item id="pause-timer-speed-dial-button" onclick="timerPauseButtonTapped()">
      <ons-icon icon="fa-pause"></ons-icon>
    </ons-speed-dial-item>
    <ons-speed-dial-item id="restart-timer-speed-dial-button" onclick="timerRestartButtonTapped()">
      <ons-icon icon="fa-redo"></ons-icon>
    </ons-speed-dial-item>
    <ons-speed-dial-item id="select-new-time-speed-dial-button" onclick="timerEditButtonTapped()">
      <ons-icon icon="fa-clock"></ons-icon>
    </ons-speed-dial-item>
  </ons-speed-dial>

  <!-- Scoreboard -->
  <div class="board-content">
    <div class="team-side" id="team-1-side" style="background-color: red;" onclick="changeScore('team-1', event)">
      <div class="team-name" id="team-1-name">Team 1</div>
      <div class="team-score" id="team-1-score">0</div>
    </div>

    <div class="team-side" id="team-2-side" style="background-color: blue;" onclick="changeScore('team-2', event)">
      <div class="team-name" id="team-2-name">Team 2</div>
      <div class="team-score" id="team-2-score">0</div>
    </div>
  </div>

</ons-page>

<!-- ////////////////////////////////////////////////// -->
