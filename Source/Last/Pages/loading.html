<!--  /////////////////////////////////////////////////////
// Loading Modal
// Displays a centered spinning icon to indicate loading.
//
// Features:
// - Uses Onsen UI modal with "lift" animation.
// - Contains a spinning FontAwesome circle-notch icon.
// - Ideal for showing background tasks or loading states.
/////////////////////////////////////////////////////// -->

<ons-modal id="loading-modal" animation="lift">
  <div style="text-align: center">
    <p><ons-icon icon="fa-circle-notch" size="75px" spin></ons-icon></p>
  </div>
</ons-modal>

<!-- ////////////////////////////////////////////////// -->
